<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title>Carefree College Life</title>
  <desc>Comfort, routine, and the first glimpse of reality</desc>
  <defs>
    <linearGradient id="bg-01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dff4ff"/>
      <stop offset="100%" stop-color="#7ac5ff"/>
    </linearGradient>
    <linearGradient id="panel-01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.70"/>
    </linearGradient>
    <filter id="shadow-01" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#0e1a29" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="44" fill="url(#bg-01)"/>
  <circle cx="1225" cy="120" r="170" fill="#ffffff" opacity="0.18"/>
  <circle cx="170" cy="740" r="190" fill="#ffffff" opacity="0.10"/>
  <rect x="88" y="94" width="1224" height="712" rx="42" fill="url(#panel-01)" filter="url(#shadow-01)"/>
  <rect x="140" y="156" width="190" height="52" rx="26" fill="#1d568e" opacity="0.12"/>
  <text x="235" y="189" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#1d568e">Article 01</text>
  <text x="140" y="300" font-family="Georgia, serif" font-size="66" font-weight="700" fill="#11243a">Carefree College Life</text>
  <text x="140" y="360" font-family="Arial, sans-serif" font-size="29" fill="#546779">Comfort, routine, and the first glimpse of reality</text>
  <rect x="140" y="420" width="430" height="220" rx="32" fill="#ffffff" opacity="0.72"/>
  <text x="178" y="478" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d568e">Journey Reflection</text>
  <text x="178" y="530" font-family="Arial, sans-serif" font-size="24" fill="#465b6e">A visual marker for this part of</text>
  <text x="178" y="568" font-family="Arial, sans-serif" font-size="24" fill="#465b6e">the Computer Engineering journey.</text>
  <text x="178" y="620" font-family="Arial, sans-serif" font-size="21" fill="#7a8c9a">Click the article card to read the full story.</text>
  <g>
