<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title>Article Visual</title>
  <desc>Default visual for future weekly blog posts.</desc>
  <defs>
    <linearGradient id="bg-default" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf4ff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="panel-default" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow-default" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0e1a29" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="900" rx="44" fill="url(#bg-default)"/>
  <circle cx="1180" cy="140" r="160" fill="#ffffff" opacity="0.16"/>
  <circle cx="220" cy="760" r="180" fill="#ffffff" opacity="0.10"/>
  <rect x="88" y="94" width="1224" height="712" rx="42" fill="url(#panel-default)" filter="url(#shadow-default)"/>
  <rect x="140" y="160" width="220" height="54" rx="27" fill="#1d4f82" opacity="0.12"/>
  <text x="250" y="194" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#1d4f82">New Weekly Article</text>
  <text x="140" y="302" font-family="Georgia, serif" font-size="70" font-weight="700" fill="#11243a">Fresh Update</text>
  <text x="140" y="362" font-family="Arial, sans-serif" font-size="29" fill="#546779">A clean default visual for any newly added post.</text>
  <rect x="140" y="430" width="450" height="214" rx="32" fill="#ffffff" opacity="0.72"/>
  <text x="178" y="486" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4f82">Automatic Blog Listing</text>
  <text x="178" y="538" font-family="Arial, sans-serif" font-size="24" fill="#465b6e">Add the next weekly article in the</text>
  <text x="178" y="576" font-family="Arial, sans-serif" font-size="24" fill="#465b6e">Jekyll posts folder and it will appear here.</text>
  <text x="178" y="626" font-family="Arial, sans-serif" font-size="21" fill="#7a8c9a">You can later replace this with a custom article image.</text>
  <rect x="820" y="252" width="320" height="320" rx="34" fill="#ffffff" stroke="#1d4f82" stroke-width="12"/>
  <rect x="882" y="212" width="196" height="56" rx="20" fill="#1d4f82"/>
  <rect x="880" y="336" width="200" height="24" rx="12" fill="#d9e8fb"/>
  <rect x="880" y="390" width="200" height="24" rx="12" fill="#d9e8fb"/>
  <rect x="880" y="444" width="154" height="24" rx="12" fill="#d9e8fb"/>
  <path d="M844 406 L888 450 L962 372" fill="none" stroke="#1d4f82" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="1150" cy="302" r="78" fill="#f6c56a" opacity="0.95"/>
  <path d="M1150 302 L1150 252" stroke="#925d16" stroke-width="10" stroke-linecap="round"/>
  <path d="M1150 302 L1185 322" stroke="#925d16" stroke-width="10" stroke-linecap="round"/>
</svg>
