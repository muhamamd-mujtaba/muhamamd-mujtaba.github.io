<footer class="site-footer">
  <p class="footer-brand">&copy; {{ site.time | date: "%Y" }} {{ site.data.profile.name }}</p>
  <nav class="footer-links" aria-label="Footer">
    {% if site.data.profile.github_url %}
      <a href="{{ site.data.profile.github_url }}" target="_blank" rel="noreferrer">GitHub</a>
    {% endif %}
    {% if site.data.profile.instagram_url %}
      <a href="{{ site.data.profile.instagram_url }}" target="_blank" rel="noreferrer">Instagram</a>
    {% endif %}
  </nav>
</footer>
