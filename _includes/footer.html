{% assign profile = site.data.profile %}
<footer class="site-footer">
  <p>{{ page.footer_text | default: "Personal portfolio of Muhammad Mujtaba." }}</p>
  {% if page.footer_link_url and page.footer_link_label %}
    <p><a class="link-inline" href="{{ page.footer_link_url | relative_url }}">{{ page.footer_link_label }}</a></p>
  {% endif %}
  <p class="footer-contact">Instagram ID: {{ profile.instagram_id }}</p>
</footer>
